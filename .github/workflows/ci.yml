name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Using `npm install` rather than `npm ci` because the lockfile is not
      # checked in yet (kept local to reduce repo churn). Switch to `npm ci`
      # once a lockfile is committed.
      - run: npm install
      - run: npm run lint
      - run: npm run build
